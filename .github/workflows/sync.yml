name: Daily sync

# Automated daily PSN snapshot sync. Runs `pnpm sync` with the NPSSO tokens
# stored as repo secrets and commits any changed files under data/ back to main,
# so snapshot history accumulates without a manual run (see issue #8).
#
# Alerting: we deliberately build no custom notifications. `src/cli/sync.ts`
# isolates each player's failure and exits non-zero if any player failed, which
# fails this workflow — GitHub's own workflow-failure notifications are the alert.
#
# The Node/pnpm setup steps below are kept byte-for-byte identical to
# .github/workflows/ci.yml to avoid drift between the two workflows.

on:
  # Daily at 11:00 UTC — 6:00 AM US Central during daylight time (CDT, most of
  # the year). GitHub cron is UTC-only and does not follow DST, so during
  # standard time (CST) this lands at 5:00 AM Central. The exact time isn't
  # load-bearing (writeSnapshot keeps at most one snapshot per calendar day, so
  # a second run the same day just refreshes it) — adjust the hour freely.
  schedule:
    - cron: '0 11 * * *'
  # Manual trigger, e.g. to verify secrets after refreshing an expired token.
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write # required to push the data commit back to main

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Sync PSN snapshots
        run: pnpm sync
        env:
          NPSSO_DAD: ${{ secrets.NPSSO_DAD }}
          NPSSO_BRAIDAN: ${{ secrets.NPSSO_BRAIDAN }}

      - name: Commit updated snapshots
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          if [ -z "$(git status --porcelain data/)" ]; then
            echo 'No snapshot changes today — nothing to commit.'
            exit 0
          fi
          git add data/
          # [skip ci] keeps this data-only commit from re-running the full CI
          # matrix on main — no source changed, so there's nothing to verify.
          git commit -m 'chore(data): daily PSN sync [skip ci]'
          # Push explicitly to the default branch. Scheduled/dispatch runs check
          # out main on a branch (checkout@v4 uses `-B main`), so a bare `git
          # push` already works — HEAD:main is just belt-and-suspenders against
          # any future change that leaves HEAD detached.
          git push origin HEAD:main
